<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>АварМи — аварский словарь для iPhone и iPad</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5; color: #1c1c1e; background: #fff;
    }
    @media (prefers-color-scheme: dark) { body { color: #f2f2f7; background: #000; } }
    .wrap { max-width: 640px; margin: 0 auto; padding: 48px 24px; text-align: center; }
    .appicon { width: 120px; height: 120px; border-radius: 27px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    h1 { font-size: 2rem; margin: 16px 0 8px; }
    p.lead { font-size: 1.15rem; opacity: 0.8; margin: 0 0 32px; }
    .qr { width: 180px; height: 180px; margin: 24px auto 8px; border-radius: 16px; display: block; }
    .qr-hint { font-size: 0.85rem; opacity: 0.6; margin: 0; }
    .badge { display: inline-block; margin-top: 20px; padding: 12px 24px; border-radius: 12px;
             background: #007aff; color: #fff; text-decoration: none; font-weight: 600; }
    footer { margin-top: 48px; font-size: 0.85rem; opacity: 0.6; }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="appicon" src="assets/icon.png" alt="АварМи" width="120" height="120" />
    <h1>АварМи</h1>
    <p class="lead">Аварско-русский и русско-аварский словарь для iPhone и iPad. Работает офлайн.</p>

    <a href="https://apps.apple.com/app/id6782280983">
      <img class="qr" src="assets/qr.png" alt="QR-код для скачивания в App Store" width="180" height="180" />
    </a>
    <p class="qr-hint">Наведите камеру на QR-код</p>

    <a class="badge" href="https://apps.apple.com/app/id6782280983">Скачать в App Store</a>

    <footer>
      Данные: <a href="https://avar.me">avar.me</a> ·
      <a href="privacy/">Конфиденциальность</a> ·
      <a href="latest.json">latest.json</a>
    </footer>
  </main>
</body>
</html>
