<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Аварский словарь — iOS</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5; color: #1c1c1e; background: #fff;
    }
    @media (prefers-color-scheme: dark) { body { color: #f2f2f7; background: #000; } }
    .wrap { max-width: 640px; margin: 0 auto; padding: 48px 24px; text-align: center; }
    h1 { font-size: 2rem; margin: 0 0 8px; }
    p.lead { font-size: 1.15rem; opacity: 0.8; margin: 0 0 32px; }
    .qr { width: 180px; height: 180px; margin: 24px auto; background: #e5e5ea; border-radius: 16px;
          display: flex; align-items: center; justify-content: center; opacity: 0.7; }
    .badge { display: inline-block; margin-top: 16px; padding: 12px 24px; border-radius: 12px;
             background: #007aff; color: #fff; text-decoration: none; font-weight: 600; }
    footer { margin-top: 48px; font-size: 0.85rem; opacity: 0.6; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Аварский словарь</h1>
    <p class="lead">Аварско-русский и русско-аварский словарь для iPhone и iPad. Работает офлайн.</p>

    <!-- TODO: replace with real App Store QR code (assets/qr.png) once published -->
    <div class="qr">QR-код<br>(App Store)</div>

    <!-- TODO: replace # with real App Store link -->
    <a class="badge" href="#">Скачать в App Store</a>

    <footer>
      Данные: <a href="https://avar.me">avar.me</a> ·
      <a href="privacy/">Конфиденциальность</a> ·
      <a href="latest.json">latest.json</a>
    </footer>
  </main>
</body>
</html>
